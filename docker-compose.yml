services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fifa
      POSTGRES_PASSWORD: fifa
      POSTGRES_DB: fifa
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fifa -d fifa"]
      interval: 2s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: dev
      DATABASE_URL: postgres://fifa:fifa@db:5432/fifa?sslmode=disable
      PORT: "8080"
      FRONTEND_ORIGIN: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./db/migrations:/app/migrations:ro

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE: http://localhost:8080
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
